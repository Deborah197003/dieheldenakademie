  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght:1.08; color:#f3e2c0; margin:0 0 12px;\">Der Genre-Kompass<\u002Fh1>\n      <p style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(19px, 3.5vw, 24px); color:#c9739e; margin:0 0 22px;\">Welches Buch steckt in dir?<\u002Fp>\n      <p style=\"font-size:15.5px; line-height:1.65; color:#d8c2ce; max-width:440px; margin:0 auto 32px;\">20 Fragen entlang der Heldenreise zeigen dir, welches Genre zu dir passt: Sachbuch, Ratgeber, fiktionale Erzählung — oder ein Hybridbuch. Antworte spontan, es gibt kein richtig oder falsch.<\u002Fp>\n      <button onclick=\"{{ onStart }}\" style=\"background:linear-gradient(135deg, #c9a45c, #a8863d); color:#241017; border:none; border-radius:999px; padding:16px 46px; font-family:'Source Sans 3',sans-serif; font-weight:700; font-size:16px; letter-spacing:0.04em; cursor:pointer;\" style-hover=\"filter:brightness(1.1)\">Reise beginnen ✦<\u002Fbutton>\n      <p style=\"font-size:12.5px; color:#8a6f7c; margin:24px 0 0;\">Dauer: ca. 4 Minuten · {{ resumeHint }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ QUIZ ============ -->\n  <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Frage\" style=\"max-width:640px; width:100%; padding:36px 0 60px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:10px;\">\n        <span style=\"font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#c9a45c; font-weight:700;\">{{ stationLabel }}<\u002Fspan>\n        <span style=\"font-size:12.5px; color:#8a6f7c;\">Frage {{ frageNr }} von 20<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:5px; background:#2a1a21; border-radius:99px; overflow:hidden; margin-bottom:36px;\">\n        <div style=\"{{ progressStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(24px, 4.5vw, 33px); line-height:1.25; color:#f7ecd9; margin:0 0 28px; text-wrap:balance;\">{{ frageText }}<\u002Fh2>\n      <div style=\"display:grid; gap:12px;\">\n        <sc-for list=\"{{ optionen }}\" as=\"opt\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ opt.onPick }}\" style=\"{{ opt.style }}\" style-hover=\"border-color:#c9a45c; background:#241419;\">\n            <span style=\"{{ opt.chipStyle }}\">{{ opt.key }}<\u002Fspan>\n            <span style=\"flex:1; text-align:left; line-height:1.45;\">{{ opt.text }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:flex-start; margin-top:26px;\">\n        <button onclick=\"{{ onBack }}\" style=\"background:none; border:none; color:#8a6f7c; font-family:'Source Sans 3',sans-serif; font-size:13.5px; cursor:pointer; padding:6px 2px;\" style-hover=\"color:#c9a45c;\">← Zurück<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ E-MAIL ============ -->\n  <sc-if value=\"{{ isEmail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"E-Mail\" style=\"max-width:520px; width:100%; text-align:center; padding:70px 0 60px; animation:gkFadeUp 0.5s ease both;\">\n      <p style=\"font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:#c9a45c; font-weight:700; margin:0 0 14px;\">Fast geschafft ✦<\u002Fp>\n      <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(28px, 5vw, 38px); color:#f3e2c0; margin:0 0 14px;\">Dein Ergebnis wartet<\u002Fh2>\n      <p style=\"font-size:15px; line-height:1.65; color:#d8c2ce; margin:0 0 30px;\">Trag deine E-Mail-Adresse ein — dann schicke ich dir dein Archetypen-Profil mit den nächsten Schritten für dein Buch.<\u002Fp>\n      <input type=\"email\" placeholder=\"deine@email.de\" onchange=\"{{ onEmailChange }}\" style=\"width:100%; max-width:380px; box-sizing:border-box; background:#1a1014; border:1.5px solid #3d2530; border-radius:12px; padding:15px 18px; color:#f3e2c0; font-family:'Source Sans 3',sans-serif; font-size:16px; outline:none; text-align:center;\" style-focus=\"border-color:#c9a45c;\">\n      <div style=\"margin-top:20px;\">\n        <button onclick=\"{{ onEmailSubmit }}\" disabled=\"{{ emailInvalid }}\" style=\"{{ submitStyle }}\">Ergebnis anzeigen ✦<\u002Fbutton>\n      <\u002Fdiv>\n      <button onclick=\"{{ onSkip }}\" style=\"background:none; border:none; color:#8a6f7c; font-family:'Source Sans 3',sans-serif; font-size:13px; cursor:pointer; margin-top:18px; text-decoration:underline;\" style-hover=\"color:#c9a45c;\">Ohne E-Mail fortfahren<\u002Fbutton>\n      <p style=\"font-size:11.5px; color:#6d5560; margin:26px 0 0; line-height:1.5;\">Hinweis: Diese Version speichert deine Eingabe nur auf deinem Gerät. Die Anbindung an das E-Mail-System folgt.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ERGEBNIS ============ -->\n  <sc-if value=\"{{ isResult }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Ergebnis\" style=\"max-width:640px; width:100%; padding:44px 0 70px; animation:gkFadeUp 0.5s ease both;\">\n      <div style=\"text-align:center; margin-bottom:30px;\">\n        <img src=\"81c092c1-d8bf-4e12-9e02-dc9fec693226\" alt=\"Die Heldenakademie\" style=\"width:110px; height:110px; display:block; margin:0 auto 6px;\">\n        <p style=\"font-size:11px; letter-spacing:0.26em; text-transform:uppercase; color:#c9a45c; font-weight:700; margin:0 0 16px;\">Dein Archetyp<\u002Fp>\n        <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(34px, 6vw, 48px); color:#f3e2c0; margin:0 0 8px; line-height:1.1;\">{{ archName }}<\u002Fh2>\n        <p style=\"display:inline-block; border:1px solid #c9a45c; color:#c9a45c; border-radius:999px; padding:5px 18px; font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; margin:0 0 16px;\">Dein Genre: {{ archGenre }}<\u002Fp>\n        <p style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(18px, 3.2vw, 22px); color:#c9739e; margin:0;\">{{ archClaim }}<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showTie }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#241017; border:1px solid #7a4a2a; border-radius:12px; padding:14px 18px; margin-bottom:22px; font-size:14px; line-height:1.55; color:#e8d5b0;\">✦ {{ tieText }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <p style=\"font-size:15.5px; line-height:1.7; color:#e4d3da; margin:0 0 28px; text-align:center;\">{{ archBeschreibung }}<\u002Fp>\n\n      <div style=\"background:#160d11; border:1px solid #3d2530; border-radius:16px; padding:22px 24px; margin-bottom:16px;\">\n        <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:19px; color:#c9a45c; margin:0 0 12px;\">Deine Stärken<\u002Fp>\n        <div style=\"display:grid; gap:8px;\">\n          <sc-for list=\"{{ staerken }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; gap:10px; align-items:flex-start; font-size:14.5px; line-height:1.5; color:#e4d3da;\"><span style=\"color:#c9a45c;\">✦<\u002Fspan><span>{{ st.text }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:16px; margin-bottom:16px;\">\n        <div style=\"background:#160d11; border:1px solid #3d2530; border-radius:16px; padding:20px 22px;\">\n          <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:18px; color:#c9a45c; margin:0 0 8px;\">Dein Wachstumsfeld<\u002Fp>\n          <p style=\"font-size:14px; line-height:1.6; color:#e4d3da; margin:0;\">{{ wachstumsfeld }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#160d11; border:1px solid #3d2530; border-radius:16px; padding:20px 22px;\">\n          <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:18px; color:#c9a45c; margin:0 0 8px;\">Passende Formate<\u002Fp>\n          <p style=\"font-size:14px; line-height:1.6; color:#e4d3da; margin:0;\">{{ formate }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:linear-gradient(135deg, #2c1420, #1a0d14); border:1px solid #8a2b5e; border-radius:16px; padding:20px 22px; margin-bottom:28px;\">\n        <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:18px; color:#c9739e; margin:0 0 8px;\">Dein nächster Schritt<\u002Fp>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#f0dfe8; margin:0;\">{{ naechsterSchritt }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#160d11; border:1px solid #3d2530; border-radius:16px; padding:22px 24px; margin-bottom:30px;\">\n        <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:19px; color:#c9a45c; margin:0 0 14px;\">Dein Profil im Überblick<\u002Fp>\n        <div style=\"display:grid; gap:12px;\">\n          <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;\">\n                <span style=\"color:#e4d3da; font-weight:600;\">{{ bar.label }}<\u002Fspan>\n                <span style=\"color:#8a6f7c;\">{{ bar.countText }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:9px; background:#2a1a21; border-radius:99px; overflow:hidden;\">\n                <div style=\"{{ bar.barStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:linear-gradient(135deg, #2c1420, #1a0d14); border:1px solid #c9a45c; border-radius:16px; padding:26px 24px; margin-bottom:28px; text-align:center;\">\n        <p style=\"font-family:'Cormorant Garamond',serif; font-weight:700; font-size:clamp(20px, 3.5vw, 25px); color:#f3e2c0; margin:0 0 8px;\">Du willst dein Buch so bald wie möglich schreiben?<\u002Fp>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#d8c2ce; margin:0 0 18px;\">Dann lass uns sprechen — unverbindlich und persönlich.<\u002Fp>\n        <a href=\"mailto:heldenreise@deborah-bichlmeier.com?subject=Ich%20will%20ein%20Buch%20schreiben%20-%20Nach%20dem%20Genrekompass\" style=\"display:inline-block; background:linear-gradient(135deg, #c9739e, #8a2b5e); color:#fff; border-radius:999px; padding:15px 34px; font-weight:700; font-size:15px; text-decoration:none;\" style-hover=\"filter:brightness(1.1)\">Direkt Gesprächstermin vereinbaren ✦<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px; justify-content:center;\">\n        <a href=\"https://www.skool.com/erfolgsfaktor-sachbuch-2011/about\" target=\"_blank\" style=\"background:linear-gradient(135deg, #c9a45c, #a8863d); color:#241017; border-radius:999px; padding:15px 34px; font-weight:700; font-size:15px; text-decoration:none;\" style-hover=\"filter:brightness(1.1)\">✦ Zur Schreibwerkstatt auf Skool<\u002Fa>\n        <button onclick=\"{{ onRestart }}\" style=\"background:none; border:1.5px solid #c9a45c; color:#c9a45c; border-radius:999px; padding:14px 30px; font-family:'Source Sans 3',sans-serif; font-weight:700; font-size:14px; cursor:pointer;\" style-hover=\"background:#241419;\">Nochmal starten<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; justify-content:center; gap:12px; font-size:11.5px; color:#6d5560; flex-wrap:wrap; margin-top:38px;\">\n        <span>die-heldenakademie.com<\u002Fspan><span style=\"color:#a8863d;\">✦<\u002Fspan>\n        <span>kuntur-verlag.com<\u002Fspan><span style=\"color:#a8863d;\">✦<\u002Fspan>\n        <span>deborah-bichlmeier.com<\u002Fspan><span style=\"color:#a8863d;\">✦<\u002Fspan>\n        <span>mama-brennt.de<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 900 }\n}\">\nclass Component extends DCLogic {\n  state = { screen: 'start', idx: 0, answers: {}, email: '', data: null };\n\n  componentDidMount() {\n    const tryLoad = () => {\n      const mod = window.GK_DATEN;\n      if (!mod) { setTimeout(tryLoad, 100); return; }\n      this.mod = mod;\n      let saved = {};\n      try { saved = JSON.parse(localStorage.getItem('gk-app-state') || '{}') || {}; } catch (e) {}\n      this.setState({\n        data: mod,\n        screen: saved.screen && saved.screen !== 'quiz' ? saved.screen : 'start',\n        idx: saved.idx || 0,\n        answers: saved.answers || {},\n        email: saved.email || '',\n      });\n    };\n    tryLoad();\n  }\n\n  persist(next) {\n    const s = Object.assign({}, this.state, next);\n    try {\n      localStorage.setItem('gk-app-state', JSON.stringify({\n        screen: s.screen, idx: s.idx, answers: s.answers, email: s.email,\n      }));\n    } catch (e) {}\n  }\n\n  go(next) { this.persist(next); this.setState(next); }\n\n  counts() {\n    const c = { A: 0, B: 0, C: 0, D: 0 };\n    Object.values(this.state.answers).forEach((k) => { if (c[k] != null) c[k]++; });\n    return c;\n  }\n\n  renderVals() {\n    const { screen, idx, answers, data } = this.state;\n    const vals = {\n      isStart: screen === 'start',\n      isQuiz: screen === 'quiz' && !!data,\n      isEmail: screen === 'email',\n      isResult: screen === 'result' && !!data,\n      resumeHint: Object.keys(answers).length > 0 && screen === 'start' ? 'Dein Fortschritt ist gespeichert' : 'Kostenfrei',\n      onStart: () => {\n        const n = Object.keys(answers).length;\n        this.go({ screen: 'quiz', idx: n >= 20 ? 19 : n });\n      },\n      onBack: () => {\n        if (idx <= 0) this.go({ screen: 'start' });\n        else this.go({ idx: idx - 1 });\n      },\n      onEmailChange: (e) => { this.setState({ email: e.target.value }); },\n      onEmailSubmit: () => {\n        if (this.validEmail()) this.go({ screen: 'result' });\n      },\n      onSkip: () => { this.go({ screen: 'result' }); },\n      onRestart: () => { this.go({ screen: 'start', idx: 0, answers: {} }); },\n      emailInvalid: !this.validEmail(),\n      submitStyle: this.validEmail()\n        ? 'background:linear-gradient(135deg, #c9a45c, #a8863d); color:#241017; border:none; border-radius:999px; padding:15px 40px; font-family:Source Sans 3,sans-serif; font-weight:700; font-size:15px; cursor:pointer;'\n        : 'background:#2a1a21; color:#6d5560; border:none; border-radius:999px; padding:15px 40px; font-family:Source Sans 3,sans-serif; font-weight:700; font-size:15px; cursor:not-allowed;',\n      stationLabel: '', frageNr: '', frageText: '', optionen: [], progressStyle: '',\n      archName: '', archGenre: '', archClaim: '', archBeschreibung: '',\n      staerken: [], wachstumsfeld: '', formate: '', naechsterSchritt: '',\n      bars: [], showTie: false, tieText: '',\n    };\n    if (!data) return vals;\n\n    if (screen === 'quiz') {\n      const frage = data.FRAGEN[idx];\n      const station = data.STATIONEN.find((s) => s.id === frage.station);\n      vals.frageNr = String(frage.nr);\n      vals.frageText = frage.text;\n      vals.stationLabel = 'Station ' + station.nr + ' · ' + station.titel;\n      vals.progressStyle = 'height:100%; width:' + Math.round((idx / 20) * 100) + '%; background:linear-gradient(90deg, #a8863d, #c9a45c); border-radius:99px; transition:width 0.35s ease;';\n      vals.optionen = data.KEYS.map((k) => {\n        const selected = answers[frage.nr] === k;\n        return {\n          key: k,\n          text: frage.optionen[k],\n          style: 'display:flex; gap:14px; align-items:center; width:100%; box-sizing:border-box; text-align:left; background:' + (selected ? '#2c1a22' : '#160d11') + '; border:1.5px solid ' + (selected ? '#c9a45c' : '#3d2530') + '; border-radius:14px; padding:15px 18px; color:#f0e4d4; font-family:Source Sans 3,sans-serif; font-size:15px; cursor:pointer; transition:border-color 0.15s ease, background 0.15s ease;',\n          chipStyle: 'flex:none; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; background:' + (selected ? '#c9a45c' : '#2a1a21') + '; color:' + (selected ? '#241017' : '#c9a45c') + ';',\n          onPick: () => {\n            const a = Object.assign({}, this.state.answers);\n            a[frage.nr] = k;\n            const nextIdx = idx + 1;\n            if (nextIdx >= 20) {\n              this.go({ answers: a, screen: 'email' });\n            } else {\n              this.go({ answers: a });\n              setTimeout(() => { this.go({ idx: nextIdx }); }, 220);\n            }\n          },\n        };\n      });\n    }\n\n    if (screen === 'result') {\n      const res = data.auswerten(answers);\n      const topKey = res.topKeys[0] || 'A';\n      const g = data.GENRES[topKey];\n      vals.archName = g.archetyp;\n      vals.archGenre = g.label;\n      vals.archClaim = g.claim;\n      vals.archBeschreibung = g.beschreibung;\n      vals.staerken = g.staerken.map((t) => ({ text: t }));\n      vals.wachstumsfeld = g.wachstumsfeld;\n      vals.formate = g.formate.join(' · ');\n      vals.naechsterSchritt = g.naechsterSchritt;\n      vals.bars = data.KEYS.map((k) => ({\n        label: data.GENRES[k].archetyp + ' — ' + data.GENRES[k].label,\n        countText: res.counts[k] + ' von 20',\n        barStyle: 'height:100%; width:' + Math.max(3, Math.round((res.counts[k] / 20) * 100)) + '%; background:' + (res.topKeys.includes(k) ? 'linear-gradient(90deg, #a8863d, #c9a45c)' : '#5a3a48') + '; border-radius:99px; transition:width 0.8s ease;',\n      }));\n      if (res.gleichstand) {\n        vals.showTie = true;\n        const names = res.topKeys.map((k) => data.GENRES[k].archetyp).join(' und ');\n        vals.tieText = 'Gleichstand zwischen ' + names + ' — in dir wirken zwei Kräfte gleich stark. Lies beide Profile; oft ist das Hybridbuch (Magier:in) dein Weg, denn es verbindet genau diese Stärken.';\n        const gm = data.GENRES[res.topKeys.includes('D') ? 'D' : topKey];\n      }\n    }\n    return vals;\n  }\n\n  validEmail() {\n    return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]{2,}$/.test(this.state.email || '');\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
